name: Monthly ETL Insecta

on:
  schedule:
    # At 3:00 AM, on day 2 of the month
    - cron: '0 3 2 * *'
  workflow_dispatch:

jobs: 
  run-etl-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v6

      - name: Install UV
        uses: astral-sh/setup-uv@v7
        with: 
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Run ETL and upload to Hugging Face
        env: ${{ secrets.HF_TOKEN }}
        run: 
          uv run python scripts/etl_insecta.py